<!DOCTYPE html>
<html>
<head>
<title>User Form</title>

<style>
body{
font-family: Arial;
margin:40px;
}

.card{
max-width:500px;
border:1px solid #ccc;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:10px;
}

button{
padding:10px;
background:black;
color:white;
border:none;
border-radius:6px;
}
</style>

</head>

<body>

<div class="card">

<h2>User Details</h2>

<form method="POST" action="/submit">

<label>Name</label>
<input name="name" required>

<label>SAPID</label>
<input name="sapid" required>

<label>Age</label>
<input type="number" name="age" min="1" max="120" required>

<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
<option>Prefer not to say</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
